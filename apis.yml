name: REA Group
kind: company
description: REA Group Limited is an ASX-listed (ASX:REA) digital real estate advertising
  business headquartered in Melbourne, Australia and majority-owned by News Corp. It
  operates realestate.com.au and realcommercial.com.au, the property data and analytics
  brand PropTrack, the Mortgage Choice broking network, and REA India (Housing.com,
  PropTiger, and Makaan). REA Group's public developer surface is delivered through
  PropTrack, whose developer portal documents a suite of property data APIs - address
  matching, automated valuations (AVM), property and listing data, sold transactions,
  and suburb-level market insights - sourced from Australia's largest real estate
  portal. The APIs are documented publicly but are partner-gated; access requires a
  commercial agreement, and the data endpoints are authenticated via REA Group's
  OAuth identity service rather than being self-serve.
