  notes: >-
    PropTrack (REA Group) APIs are protected by OAuth 2.0 (the auth docs page is
    titled "OAuth 2.0 | PropTrack APIs"). Access is partner-gated: a client is
    issued credentials under a commercial agreement and exchanges them with the
    REA Group OAuth identity service for a bearer access token used against
    data.proptrack.com. The specific token endpoint URL and scope list are not
    published on the public developer surface (partner onboarding material).
